<div class="container">
        <header class="my-4">
            <h1 class="text-center">Bus Booking System</h1>
        </header>

        <!-- Search Form -->
        <section>
            <div class="container mt-5 d-flex justify-content-center">
                <form class="search-form d-flex align-items-center shadow-lg">
                  <div class="row w-100 text-white">
                    <div class="col-12 col-sm-6 col-md-3 d-flex align-items-center">
                      <input type="text" class="form-control" placeholder="From" value="Nagpur">
                    </div>
                    <div class="col-12 col-sm-12 col-md-1 text-center d-flex align-items-center justify-content-center">
                      <i class="bi bi-arrow-left-right fs-3"></i>
                    </div>
                    <div class="col-12 col-sm-6 col-md-3 d-flex align-items-center">
                      <input type="text" class="form-control" placeholder="To" value="Pune">
                    </div>
                    <div class="col-12 col-sm-6 col-md-3 d-flex align-items-center">
                      <input type="text" class="form-control" placeholder="Date" value="17 Aug 2024">
                    </div>
                    <div class="col-12 col-sm-6 col-md-2 d-flex align-items-center">
                      <button type="submit" class="btn btn-light text-danger w-100">SEARCH BUSES</button>
                    </div>
                  </div>
                </form>
              </div>
        </section>

        <!-- Buses List -->
        <section id="buses-list" class="my-4">
            <h2>Available Buses</h2>
            <div class="bus-card mb-3">
                <div class="bus-card-body">
                    <div class="bus-info">
                        <h5>IntrCity SmartBus</h5>
                        <p>A/C Sleeper (2+1)</p>
                    </div>
                    <div class="bus-details">
                        <div class="bus-detail">
                            <strong>19:00</strong>
                            <p>Departure</p>
                        </div>
                        <div class="bus-detail">
                            <strong>13h 55m</strong>
                            <p>Duration</p>
                        </div>
                        <div class="bus-detail">
                            <strong>08:55</strong>
                            <p>Arrival</p>
                            <p class="text-danger">18-Aug</p>
                        </div>
                        <div class="bus-detail">
                            <strong>4.5 ⭐</strong>
                            <p>567 Ratings</p>
                        </div>
                        <div class="bus-detail">
                            <strong>INR 935</strong>
                            <p>8 Seats available</p>
                        </div>
                    </div>
                    <button class="btn btn-danger btn-view-seats">VIEW SEATS</button>
                </div>
            </div>
        </section>
</div>
